
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Campus Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px;
    border:none;
    background:#28a745;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#218838;
}

.btn-area{
    grid-column:1/3;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

table th{
    background:#007bff;
    color:white;
    padding:12px;
}

table td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}

h2{
    margin-top:30px;
    color:#333;
}

.delete-btn{
    background:red;
    padding:8px 12px;
}

.delete-btn:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 Smart Campus Management System</h1>

<form id="studentForm">

<input type="number" id="id" placeholder="Student ID" required>

<input type="text" id="name" placeholder="Student Name" required>

<input type="email" id="email" placeholder="Student Email" required>

<input type="text" id="department" placeholder="Department" required>

<input type="text" id="mobile" placeholder="Mobile Number" required>

<div class="btn-area">
<button type="submit">Add Student</button>
</div>

</form>

<h2>Student Records</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Mobile</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script>

const API_URL = "http://192.168.1.62:8080/student";

document
.getElementById("studentForm")
.addEventListener("submit", saveStudent);

function saveStudent(e){

    e.preventDefault();

    let student = {

        id: document.getElementById("id").value,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        department: document.getElementById("department").value,
        mobile: document.getElementById("mobile").value
    };

    fetch(API_URL + "/save",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(student)

    })

    .then(res => res.json())
    .then(data => {

        alert("Student Added Successfully");

        document.getElementById("studentForm").reset();

        loadStudents();
    })

    .catch(err => console.log(err));
}

function loadStudents(){

    fetch(API_URL + "/all")

    .then(res => res.json())

    .then(data => {

        let table = document.getElementById("studentTable");

        table.innerHTML = "";

        data.forEach(student => {

            table.innerHTML += `

            <tr>

                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.department}</td>
                <td>${student.mobile}</td>

                <td>
                    <button
                    class="delete-btn"
                    onclick="deleteStudent(${student.id})">
                    Delete
                    </button>
                </td>

            </tr>
            `;
        });
    });
}

function deleteStudent(id){

    fetch(API_URL + "/delete/" + id,{

        method:"DELETE"
    })

    .then(() => {

        alert("Student Deleted");

        loadStudents();
    });
}

loadStudents();

</script>

</body>
</html>
